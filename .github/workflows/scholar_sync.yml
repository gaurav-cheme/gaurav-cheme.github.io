name: Sync Google Scholar

on:
  schedule:
    - cron: '0 0 * * 0' # Runs every Sunday at midnight
  workflow_dispatch:      # Allows you to run it manually via the "Actions" tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install scholarly

      - name: Run update script
        run: python update_publications.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Scholar Bot"
          git config --global user.email "bot@github.com"
          git add _publications/*.md
          git commit -m "Automated update of publications from Google Scholar" || exit 0
          git push
